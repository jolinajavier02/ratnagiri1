name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch variant branches
        run: git fetch origin '+refs/heads/ratnagiri*:refs/remotes/origin/ratnagiri*'

      - name: Build all Ratnagiri variants
        run: |
          mkdir -p pages

          git worktree add "../ratnagiri1" "origin/ratnagiri1"
          (
            cd "../ratnagiri1"
            npm ci
            npm run build -- --base "/ratnagiri1/"
          )
          cp -R "../ratnagiri1/dist/." "pages/"

          for variant in ratnagiri2 ratnagiri3 ratnagiri4; do
            git worktree add "../${variant}" "origin/${variant}"
            (
              cd "../${variant}"
              npm ci
              npm run build -- --base "/ratnagiri1/${variant}/"
            )
            mkdir -p "pages/${variant}"
            cp -R "../${variant}/dist/." "pages/${variant}/"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
